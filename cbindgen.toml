language = "C"
include_version = true
# Forward-declare opaque types and manually define `Id`.
#
# cbindgen's `Option<NonNull<T>>` → pointer resolution is special-cased for
# `NonNull` itself and can't see through our `ObjcPtr` wrapper (needed for
# `Send + Sync`).  We suppress the opaque struct and provide the correct typedef.
after_includes = """
typedef struct objc_class objc_class;
typedef struct objc_selector objc_selector;
typedef struct objc_object *Id;
"""

[export]
# Export the public ABI types. Opaque types (ObjcClass, ObjcSelector) are
# forward-declared in after_includes — their internal layout is not public.
include = ["ObjcObject", "MethodEntry", "MethodList"]
exclude = ["ObjcClass", "ObjcClassAbi", "ObjcSelector", "ObjcPtr", "Option_ObjcPtr", "Id"]

[export.rename]
"ObjcObject" = "objc_object"
"ObjcSelector" = "objc_selector"
"MethodEntry" = "objc_method"
"MethodList" = "objc_method_list"
"ObjcClass" = "objc_class"
